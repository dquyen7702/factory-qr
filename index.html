<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QR Scanner - Nhà Máy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card: #1c2333;
    --border: #30363d;
    --accent: #00d4aa;
    --accent2: #0099ff;
    --danger: #ff4d6d;
    --success: #00d4aa;
    --warn: #ffd60a;
    --text: #e6edf3;
    --text-sub: #7d8590;
    --radius: 14px;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .header-title { font-size: 17px; font-weight: 700; letter-spacing: 0.3px; }
  .header-sub { font-size: 11px; color: var(--text-sub); margin-top: 1px; }
  .btn-back {
    margin-left: auto;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    display: none;
  }
  .btn-back.show { display: block; }

  /* ── SETUP BANNER ── */
  .setup-banner {
    background: linear-gradient(135deg, #1a1f2e, #0d1117);
    border: 1px solid #ffd60a44;
    border-left: 3px solid var(--warn);
    margin: 12px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 12px;
    color: #ffd60a;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .setup-banner span { line-height: 1.5; }
  .setup-url-input {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 12px;
    width: 100%;
    margin-top: 8px;
  }
  .setup-url-input:focus { outline: none; border-color: var(--accent); }
  .btn-save-url {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
    width: 100%;
  }

  /* ── SCREEN SYSTEM ── */
  .screen { display: none; animation: fadeIn 0.25s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* ── LINE SELECT SCREEN ── */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    color: var(--text-sub);
    text-transform: uppercase;
    padding: 16px 16px 8px;
  }
  .line-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    padding: 0 12px 8px;
  }
  .line-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 4px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .line-btn:active { transform: scale(0.95); }
  .line-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent)22, var(--accent2)11);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .line-btn:active::before { opacity: 1; }
  .line-btn .line-num { font-size: 15px; font-weight: 700; color: var(--accent); }
  .line-btn .line-lbl { font-size: 10px; color: var(--text-sub); margin-top: 2px; }

  .line-special {
    grid-column: span 2;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px;
  }
  .line-special .line-num { font-size: 16px; }
  .line-special .line-lbl { font-size: 12px; margin-top: 0; }

  /* ── SCANNER SCREEN ── */
  .scanner-header {
    padding: 14px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .scanner-line-badge {
    background: linear-gradient(135deg, var(--accent)33, var(--accent2)22);
    border: 1px solid var(--accent)66;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
  }
  .scanner-count {
    font-size: 12px;
    color: var(--text-sub);
  }
  .scanner-count span { color: var(--accent); font-weight: 700; font-size: 16px; }

  /* Video container */
  .cam-wrap {
    position: relative;
    margin: 0 12px;
    border-radius: var(--radius);
    overflow: hidden;
    background: #000;
    aspect-ratio: 1/1;
    border: 2px solid var(--border);
  }
  #video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .scan-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .scan-frame {
    width: 60%; aspect-ratio: 1/1;
    position: relative;
  }
  .scan-frame::before,
  .scan-frame::after,
  .scan-frame > span::before,
  .scan-frame > span::after {
    content: '';
    position: absolute;
    width: 24px; height: 24px;
    border-color: var(--accent);
    border-style: solid;
  }
  .scan-frame::before { top:0; left:0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
  .scan-frame::after  { top:0; right:0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
  .scan-frame > span::before { bottom:0; left:0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
  .scan-frame > span::after  { bottom:0; right:0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

  .scan-line {
    position: absolute;
    left: 5%; right: 5%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanMove 2s linear infinite;
    border-radius: 1px;
  }
  @keyframes scanMove {
    0%   { top: 10%; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { top: 90%; opacity: 0; }
  }

  .cam-status {
    position: absolute;
    bottom: 10px; left: 0; right: 0;
    text-align: center;
    font-size: 11px;
    color: rgba(255,255,255,0.6);
  }

  /* Result card */
  .result-card {
    margin: 10px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    min-height: 60px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .result-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    background: var(--surface);
  }
  .result-text { font-size: 13px; color: var(--text-sub); }
  .result-code { font-size: 15px; font-weight: 700; color: var(--text); font-family: monospace; word-break: break-all; }

  /* Log list */
  .log-section { padding: 10px 12px 80px; }
  .log-label {
    font-size: 11px; font-weight: 600; letter-spacing: 1px;
    color: var(--text-sub); text-transform: uppercase; margin-bottom: 8px;
  }
  .log-list { display: flex; flex-direction: column; gap: 6px; }
  .log-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }
  .log-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }
  .log-code { font-size: 13px; font-weight: 600; font-family: monospace; flex: 1; }
  .log-time { font-size: 11px; color: var(--text-sub); }

  /* ── SUCCESS OVERLAY ── */
  .success-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    backdrop-filter: blur(4px);
  }
  .success-overlay.show { display: flex; }
  .success-box {
    background: var(--card);
    border: 1px solid var(--accent)44;
    border-radius: 20px;
    padding: 32px 28px;
    text-align: center;
    animation: popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
    max-width: 280px;
    width: 90%;
  }
  @keyframes popIn {
    from { transform: scale(0.6); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .success-ring {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent)33, var(--accent2)22);
    border: 3px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    position: relative;
  }
  .success-ring::after {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    animation: ripple 0.6s ease-out forwards;
    opacity: 0;
  }
  @keyframes ripple {
    0%   { transform: scale(0.8); opacity: 1; }
    100% { transform: scale(1.4); opacity: 0; }
  }
  .success-check { font-size: 36px; }
  .success-title { font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
  .success-code { font-size: 13px; color: var(--text-sub); font-family: monospace; word-break: break-all; }
  .success-line { font-size: 12px; color: var(--text-sub); margin-top: 4px; }

  /* ── ERROR TOAST ── */
  .toast {
    position: fixed;
    bottom: 20px; left: 12px; right: 12px;
    background: var(--danger);
    color: #fff;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    z-index: 300;
    display: none;
    animation: toastIn 0.3s ease;
  }
  .toast.show { display: block; }
  @keyframes toastIn { from { transform:translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }

  /* ── SAVING INDICATOR ── */
  .saving-indicator {
    position: absolute;
    top: 8px; right: 8px;
    background: rgba(0,0,0,0.7);
    color: var(--accent);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    display: none;
  }
  .saving-indicator.show { display: flex; align-items: center; gap: 5px; }
  .saving-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 0.8s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* scroll */
  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">🏭</div>
  <div>
    <div class="header-title" id="headerTitle">QR Scanner</div>
    <div class="header-sub" id="headerSub">Nhà Máy - Quản lý Line</div>
  </div>
  <button class="btn-back" id="btnBack" onclick="goBack()">← Quay lại</button>
</div>

<!-- ════════════ SCREEN: LINE SELECT ════════════ -->
<div class="screen active" id="screenSelect">

  <!-- Setup banner -->
  <div class="setup-banner" id="setupBanner">
    ⚙️
    <span>
      <b>Cần cấu hình Google Sheet</b><br>
      Nhập URL Google Apps Script để bật tính năng lưu dữ liệu.
      <input class="setup-url-input" id="sheetUrlInput" type="url"
        placeholder="https://script.google.com/macros/s/.../exec"
        value="">
      <button class="btn-save-url" onclick="saveSheetUrl()">💾 Lưu URL &amp; Bắt đầu</button>
    </span>
  </div>

  <div class="section-label">Chọn Line sản xuất</div>
  <div class="line-grid" id="lineGrid"></div>

  <div class="section-label">Line đặc biệt</div>
  <div class="line-grid">
    <div class="line-btn line-special" onclick="selectLine('GBS')">
      <div>
        <div class="line-num">GBS</div>
        <div class="line-lbl">Line GBS</div>
      </div>
    </div>
    <div class="line-btn line-special" onclick="selectLine('Mẫu')">
      <div>
        <div class="line-num">✦ Mẫu</div>
        <div class="line-lbl">Line Mẫu</div>
      </div>
    </div>
  </div>

</div>

<!-- ════════════ SCREEN: SCANNER ════════════ -->
<div class="screen" id="screenScan">

  <div class="scanner-header">
    <div class="scanner-line-badge" id="scanLineBadge">Line --</div>
    <div class="scanner-count">Đã quét: <span id="scanCount">0</span></div>
  </div>

  <div class="cam-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none"></canvas>
    <div class="scan-overlay">
      <div class="scan-frame">
        <span></span>
        <div class="scan-line"></div>
      </div>
    </div>
    <div class="saving-indicator" id="savingIndicator">
      <div class="saving-dot"></div> Đang lưu...
    </div>
    <div class="cam-status" id="camStatus">Đưa QR vào khung để quét</div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-icon">📷</div>
    <div>
      <div class="result-text">Chưa có kết quả</div>
      <div class="result-code" id="resultCode">—</div>
    </div>
  </div>

  <div class="log-section">
    <div class="log-label">Lịch sử quét hôm nay</div>
    <div class="log-list" id="logList"></div>
  </div>

</div>

<!-- SUCCESS OVERLAY -->
<div class="success-overlay" id="successOverlay">
  <div class="success-box">
    <div class="success-ring">
      <div class="success-check">✓</div>
    </div>
    <div class="success-title">Lưu thành công!</div>
    <div class="success-code" id="successCode"></div>
    <div class="success-line" id="successLine"></div>
  </div>
</div>

<!-- ERROR TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════
   CONFIG & STATE
══════════════════════════════════════════ */
const SHEET_URL_KEY = 'factory_sheet_url';
let sheetUrl = localStorage.getItem(SHEET_URL_KEY) || '';
let currentLine = '';
let scanCount = 0;
let scanning = false;
let stream = null;
let animFrame = null;
let lastCode = '';
let cooldown = false;

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
(function init() {
  // Build line grid 77–128
  const grid = document.getElementById('lineGrid');
  for (let i = 77; i <= 128; i++) {
    const btn = document.createElement('div');
    btn.className = 'line-btn';
    btn.innerHTML = `<div class="line-num">${i}</div><div class="line-lbl">Line</div>`;
    btn.onclick = () => selectLine(String(i));
    grid.appendChild(btn);
  }

  // Restore sheet URL
  if (sheetUrl) {
    document.getElementById('sheetUrlInput').value = sheetUrl;
    hideBanner();
  }
})();

function hideBanner() {
  document.getElementById('setupBanner').style.display = 'none';
}

function saveSheetUrl() {
  const val = document.getElementById('sheetUrlInput').value.trim();
  if (!val || !val.startsWith('http')) { showToast('URL không hợp lệ!'); return; }
  sheetUrl = val;
  localStorage.setItem(SHEET_URL_KEY, val);
  hideBanner();
  showToast('✅ Đã lưu URL thành công!', false, 2000);
}

/* ══════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════ */
function selectLine(line) {
  currentLine = line;
  scanCount = 0;
  lastCode = '';
  document.getElementById('scanLineBadge').textContent = `Line ${line}`;
  document.getElementById('scanCount').textContent = '0';
  document.getElementById('logList').innerHTML = '';
  document.getElementById('resultCode').textContent = '—';
  document.getElementById('resultCard').querySelector('.result-text').textContent = 'Chưa có kết quả';
  document.getElementById('resultCard').querySelector('.result-icon').textContent = '📷';
  document.getElementById('headerTitle').textContent = `Line ${line}`;
  document.getElementById('headerSub').textContent = 'Đang quét QR Code';
  document.getElementById('btnBack').classList.add('show');
  showScreen('screenScan');
  startCamera();
}

function goBack() {
  stopCamera();
  document.getElementById('headerTitle').textContent = 'QR Scanner';
  document.getElementById('headerSub').textContent = 'Nhà Máy - Quản lý Line';
  document.getElementById('btnBack').classList.remove('show');
  showScreen('screenSelect');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ══════════════════════════════════════════
   CAMERA & QR SCAN
══════════════════════════════════════════ */
async function startCamera() {
  document.getElementById('camStatus').textContent = 'Đang khởi động camera...';
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play();
      scanning = true;
      document.getElementById('camStatus').textContent = 'Đưa QR vào khung để quét';
      requestAnimationFrame(scanLoop);
    };
  } catch (e) {
    document.getElementById('camStatus').textContent = '⚠️ Không thể mở camera';
    showToast('Lỗi camera: ' + e.message);
  }
}

function stopCamera() {
  scanning = false;
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
}

function scanLoop() {
  if (!scanning) return;
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height, {
      inversionAttempts: 'dontInvert'
    });
    if (code && code.data && !cooldown) {
      onQRDetected(code.data);
    }
  }
  animFrame = requestAnimationFrame(scanLoop);
}

/* ══════════════════════════════════════════
   QR DETECTED
══════════════════════════════════════════ */
function onQRDetected(raw) {
  // Extract code between * * e.g. *HU01MAPPS000001*
  const match = raw.match(/\*([^*]+)\*/);
  const code = match ? match[1] : raw.trim();

  if (!code || code === lastCode) return;
  lastCode = code;
  cooldown = true;

  // Update result card
  document.getElementById('resultCode').textContent = code;
  document.getElementById('resultCard').querySelector('.result-text').textContent = 'Mã vừa quét:';
  document.getElementById('resultCard').querySelector('.result-icon').textContent = '🔍';

  saveToSheet(code);
}

/* ══════════════════════════════════════════
   SAVE TO GOOGLE SHEET
══════════════════════════════════════════ */
async function saveToSheet(code) {
  const now = new Date();
  const timeStr = now.toLocaleTimeString('vi-VN');
  const dateStr = now.toLocaleDateString('vi-VN');

  document.getElementById('savingIndicator').classList.add('show');

  if (!sheetUrl) {
    // Demo mode: just show success without real save
    setTimeout(() => onSaveSuccess(code, timeStr, dateStr, true), 800);
    return;
  }

  const payload = {
    line: currentLine,
    code: code,
    date: dateStr,
    time: timeStr,
    timestamp: now.toISOString()
  };

  try {
    await fetch(sheetUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    onSaveSuccess(code, timeStr, dateStr, false);
  } catch (e) {
    onSaveSuccess(code, timeStr, dateStr, true); // show success anyway (no-cors can't detect errors)
  }
}

function onSaveSuccess(code, timeStr, dateStr, demoMode) {
  document.getElementById('savingIndicator').classList.remove('show');
  scanCount++;
  document.getElementById('scanCount').textContent = scanCount;

  // Beep
  playBeep();

  // Add log
  addLog(code, timeStr);

  // Show overlay
  document.getElementById('successCode').textContent = code;
  document.getElementById('successLine').textContent = `Line ${currentLine} · ${dateStr} ${timeStr}`;
  const overlay = document.getElementById('successOverlay');
  overlay.classList.add('show');
  setTimeout(() => {
    overlay.classList.remove('show');
    cooldown = false;
    lastCode = '';
  }, 1800);
}

function addLog(code, timeStr) {
  const list = document.getElementById('logList');
  const item = document.createElement('div');
  item.className = 'log-item';
  item.innerHTML = `
    <div class="log-dot"></div>
    <div class="log-code">${code}</div>
    <div class="log-time">${timeStr}</div>`;
  list.insertBefore(item, list.firstChild);
}

/* ══════════════════════════════════════════
   BEEP
══════════════════════════════════════════ */
function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(1200, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.15);
  } catch(e) {}
}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
function showToast(msg, isError = true, duration = 3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = isError ? 'var(--danger)' : 'var(--accent)';
  el.style.color = isError ? '#fff' : '#000';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}
</script>
